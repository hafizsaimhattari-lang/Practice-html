<!-- 
    PART 2 (B) - Ordered List Practice  
    Topic: <ol> tag - Creating numbered lists
    Objective: Understand ordered list syntax with different number types
-->
<!DOCTYPE html>
<html lang="en">
  <head> 
    <meta charset="UTF-8">
    <title>Ordered list in html</title>
  </head>  
  <body>
    <h1>Ordered list</h1>
    <ol>
      <li>Lorem ipsum dolor sit amet.</li>
      <li>Lorem ipsum dolor sit amet consectetur.</li>
      <li>Lorem ipsum dolor sit amet, consectetur adipisicing.</li>
    </ol>
  </body>
</html>
