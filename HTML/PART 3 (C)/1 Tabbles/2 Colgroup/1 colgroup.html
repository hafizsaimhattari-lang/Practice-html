<!-- Document Type Declaration -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character set and viewport configuration -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title of the webpage -->
    <title>Product Sales Colgroup Practice</title>
    <!-- Internal CSS to style the table and its elements -->
    <style>
        table, tr, td, th{
            border: 1px solid black;
            border-collapse:collapse;
            text-align:center;
            padding: 10px;
            color:white;

        }
    </style>
</head>
<body>
    <!-- Main Table Container -->
    <table>
        <!-- Grouping columns to apply specific background colors -->
        <colgroup>
         <col span="1" style="background-color:purple;">
         <col span="3" style="background-color:blue;">
         <col span="1" style="background-color:red">
        </colgroup>
        <!-- Table Caption -->
        <caption><strong>
            Product Sales
        </strong></caption>
        <!-- Table Header Section -->
        <thead>
            <tr>
                <th>Product</th>
                <th>January</th>
                <th>February</th>
                <th>March</th>
                <th>Total</th>
            </tr>
        </thead>
        <!-- Table Body Section containing data rows -->
        <tbody>
            <!-- First Data Row -->
            <tr>
                <td>Laptop</td>
                <td>12</td>
                <td>15</td>
                <td>10</td>
                <td>37</td>
            </tr>
            <tr>
                <td>Mouse</td>
                <td>30</td>
                <td>25</td>
                <td>40</td>
                <td>45</td>
            </tr>
            <tr>
                <td>Keyboard</td>
                <td>18</td>
                <td>20</td>
                <td>22</td>
                <td>60</td>
            </tr>

        </tbody>
        
    
    
    </table>
</body>
</html>
