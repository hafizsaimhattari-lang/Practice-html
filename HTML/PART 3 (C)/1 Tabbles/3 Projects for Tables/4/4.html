<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4th practice</title>
    <style>
        table, th, td, tr {
            border:1px solid black;
            border-collapse:collapse;
            
        }
        .table-caption{
            text-align:center;
        }
    </style>
</head>
<body>
   <table>
    <caption class="table-caption">Founder List</caption>
    
    <!-- thead -->
    
    <thead>
    <tr>
        <th>No</th>
        <th>Full Name</th>
        <th>Position</th>
        <th>Salary</th>
        <th>Type</th>
    </tr>
    </thead>

    <!-- tbody -->

    <tbody>
    <tr>
        <td>1</td>
        <td>Bill Gates</td>
        <td>Microsoft</td>
        <td>$1000</td>
        <td rowspan="5">Company Founder</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Steve Jobs</td>
        <td>Apple</td>
        <td>$2000</td>
        
    </tr>
    <tr>
        <td>3</td>
        <td>Larry Page</td>
        <td>Google</td>
        <td>$3000</td>
        
    </tr>
    <tr>
        <td>4</td>
        <td>Mark Zucker</td>
        <td>Facebook</td>
        <td>$2000</td>
        
    </tr>

    </tbody>

    <!-- tfoot -->
    
    <tfoot>
    <tr>
        <td>6</td>
        <td colspan="2" style="text-align:center;">Total Expense</td>
        <td>$8000</td>
    </tr>
    </tfoot>
    </table>
</body>
</html>
