<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete HTML Table Practice</title>
</head>
<body>
    <table border="1" style="text-align:center;">
    
    <!-- thead -->
    
    <thead>
    <tr>
        <th rowspan="2">ID</th>
        <th rowspan="2">Name</th>
        <th colspan="3">Subjects</th>
        <th rowspan="2">Total</th>
    </tr>
    <tr>
        <th>HTML</th>
        <th>CSS</th>
        <th>JavaScript</th>
    </tr>
    </thead>
    
    
    <!-- tbody -->
    
    <tbody>
    <tr>
        <td>1</td>
        <td>Ali</td>
        <td>90</td>
        <td>80</td>
        <td>85</td>
        <td>255</td>
    </tr>
    <tr>
       	<td>2</td>
        <td> Ahmed</td>
        <td>70</td>
        <td>75</td>
        <td>65</td>
        <td>210</td>
    </tr>
    <tr>
        <td rowspan="2">3</td>
        <td rowspan="2">Saim</td>
        <td>95</td>
        <td>92</td>
        <td>90</td>
        <td rowspan="2">Special</td>
    </tr>
    <tr>
        <td colspan="3">Excellent Performance</td>
    </tr>
    <tr>
        <td rowspan="2">4</td>
        <td colspan="2">Merged Columns</td>
        <td rowspan="2">Merged Row</td>
        <td>50</td>
        <td rowspan="2">150</td>
    </tr>
    <tr>
        <td colspan="2">Rowspan + Colspan Together</td>
        <td>60</td>
    </tr>
    <tr>
        <td>5</td>
        <td colspan="5">
            <table border="1" style="text-align:center;">
                <tr>
                    <th>Skill</th>
                    <th>Level</th>
                </tr>
                <tr>
                    <td>HTML</td>
                    <td>Good</td>
                </tr>
                <tr>
                    <td>CSS	</td>
                    <td>Beginner</td>
                </tr>
                
            </table>
        </td>
    </tr>
    </tbody>


    <!-- tfoot -->
    
    <tfoot>
    <tr>
       <th colspan="5">Final Total</th>
        <th>615</th>
    </tr>
    </tfoot>
    
    </table>
</body>
</html>
