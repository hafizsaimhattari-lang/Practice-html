<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Forms</title>
</head>
<body>

    <!-- 1. Kahan value Dena FARZ (Mandatory) Hai? ✅
    Jahan jahan user TYPE NAHI KAR SAKTA, sirf click ya select kar sakta hai, wahan form banate waqt value khud likhna tumhara farz hai! 🎯 Kyunke server ko pata hona chahiye ke kis cheez par tick laga hai! 📭

    2. Kahan value Dena SAKHT MANA (Forbidden) Hai? ❌
    Jahan user ko apna data KHUD TYPE KARNA HOTA HAI, wahan form banate waqt HTML mein value mat likho! ⌨️🚫 Wahan sirf placeholder do (taake halka sa text nazar aaye). 📝 -->
    
    
    <form action="#">
        UserName:
        <input type="text">
        <br>
        <br>
        Password:
        <input type="password">
        <br>
        <br>
        Number:
        <input type="Number">
        <br>
        <br>
        Date:
        <input type="Date">
        <br>
        <br>
        Time:
        <input type="time">
        <br>
        <br>
        Color:
        <input type="color">
        <br>
        <br>
         
        <!--? checkbox -->
        <input type="Checkbox">

        <!--? radio -->
        <input type="radio">
        
        <!--* label=caption dena -->
        
        <!--* label by="" (open and closing tag both) -->
       
        <!--* input type="type" placeholder="" name="" id="" title=""-->
       
       <!--* id= unique name -->
       
       <!--* <button></button> tag -->
       <!--* button types attributes -->
       <button type="submit">Submit</button>
       <button type="button">Button</button>
       <button type="reset">Reset</button>
       <br>
       <br>
       
       <select>
        <option name="" value=""></option>
       </select>
       
       <textarea></textarea>


        

    </form>
</body>
</html>
