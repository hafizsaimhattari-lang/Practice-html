<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Form in Html</title>
</head>
<body>
    <h1 style="text-align:center;">
        Contact US
    </h1>
    <div style="text-align:center;">
        <form action="#">
            <label for="firstName">Enter First Name:</label>
            <input type="text" id="firstName" name="firstName" placeholder="First Name">
            <br><br>
            <label for="lastName">Enter Last Name:</label>
            <input type="text" id="lastName" name="lastName" placeholder="Last Name">
            <br><br>
            <label for="email">Enter Your Email:</label>
            <input type="email" id="email" name="email" placeholder="Type Your Email">
            <br><br>
            <label for="password">Enter Your Password:</label>
            <input type="password" id="password" name="password" placeholder="Type Your Password">
            <br><br>
            <label for="phonenumber">Enter Your Phone Number:</label>
            <input type="text" id="phonenumber" name="phonenumber" placeholder="Type Your Phone Number">
            <br><br>
            <label for="Select-Country">Select Your Country:</label>
            <select name="Country" id="Select-Country">
                <option value="pakistan">Pakistan</option>
                <option value="india">India</option>
                <option value="United-States">US</option>
                <option value="bangladesh">Bangladesh</option>
            </select>
            <br><br>
            <table>
                <tr>
                    <td><label by="Message">Enter Your Messager:</label></td>
                    <td><textarea id="Message" name="Message" placeholder="Type Your Message" cols="50" rows="10"></textarea></td>
                </tr>
            </table>
            <button type="Submit">Submit</button>
            <button type="Reset">Reset</button>
        </form>
    </div>
</body>
</html>
