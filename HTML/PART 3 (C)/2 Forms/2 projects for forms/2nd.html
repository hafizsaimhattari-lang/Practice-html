<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd Form in Html</title>
</head>
<body>
    <h1>
        User Registration
    </h1>
    <div>
        <form action="#">
            <label for="firstName">Enter First Name:</label>
            <input type="text" id="firstName" name="firstName" placeholder="First Name" >
            <br><br>
            <label for="lastName">Enter Last Name:</label>
            <input type="text" id="lastName" name="lastName" placeholder="Last Name">
            <br><br>
            <label for="email">Enter Your Email:</label>
            <input type="email" id="email" name="email" placeholder="Type Your Email">
            <br><br>
            <label for="password">Enter Your Password:</label>
            <input type="password" id="password" name="password" placeholder="Type Your Password">
            <br><br>
            <label for="phonenumber">Enter Your Phone Number:</label>
            <input type="text" id="phonenumber" name="phonenumber" placeholder="Type Your Phone Number">
            <br><br>
                  
            <table>
                <tr>
                    <td>Gender:</td>
                    <td>
                        <input type="radio" id="radio1" name="radio" value="Male">
                        Male
                    </td>
                    <td>
                        <input type="radio" id="radio2" name="radio" value="Female">
                        Female</td>
                    <td>
                        <input type="radio" id="radio3" name="radio" value="Others">
                        Other</td>
                </tr>
            </table>
            <br>
            <input type="checkbox" id="checkbox" name="checkbox">
            <label for="checkbox">I agree to the term and conditions</label>
            <br><br>
            <button type="Submit">Register</button>
            <button type="Reset">Reset</button>
        </form>
        </div>
    </body>
</html>
