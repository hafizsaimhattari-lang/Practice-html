<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width initial-scale=1.0">
   <title>Tabbles in Html</title>
   <style>
         table, th, tr, td {border:1px black solid;
            border-collapse:collapse;

         }
   </style>
</head>
<body>
    <!--? sementic tags in table: thead tbody tfoot -->
    <!--* 5 tags use in table: table, caption, tr, th, td  -->


<h2>Table NO: 1
</h2>
<table>
  <caption>Mobile Sales</caption>
  <thead>
     <tr>
        <th>Product</th>
        <th>Brand</th>
        <th>Price</th>
        <th>Rating</th>
     </tr>
  </thead>
  <tbody>
    <tr>
        <td>iPhone 15</td>

        <td>4.8</td>
    </tr>
    <tr>
        <td>Galaxy S24</td>

        <td>230,000</td>
        <td>4.7</td>
    </tr>
    <tr>
        <td>Redmi Note 13</td>
        <td>Xiaomi</td>
        <td>55,000</td>
        <td>4.5</td>
    </tr>

  </tbody>
  <tfoot>

  </tfoot>
</table>

</html>
